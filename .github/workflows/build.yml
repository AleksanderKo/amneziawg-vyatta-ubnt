name: Build kernel module and tools

on:
  push:
    branches:
      - "master"
  pull_request:
  workflow_dispatch:

env:
  MODULE_VERSION: "1.0.20260329-2"
  TOOLS_VERSION: "1.0.20260223"
  PACKAGE_RELEASE: "1"
  FIRMWARE_ER_v1: "v1.10.11"
  FIRMWARE_ER_v2: "v2.0.9"
  FIRMWARE_UGW: "4.4.50"

jobs:
  docker:
    uses: ./.github/workflows/docker.yml
    secrets: inherit

  headers:
    needs: docker
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/ubnt-build:${{ matrix.image }}
      env:
        CROSS: ${{ matrix.toolchain }}

    strategy:
      matrix:
        device: [e300]
        version: [2]
        toolchain: [mips64-octeon-linux-]
        image: [octeon-kernel]
    steps:
      - uses: actions/checkout@v2
      - name: Build headers
        run: |
          mkdir /headers
          curl -o src.tar.bz2 $(jq -r '.["${{ matrix.device }}"]["${{ matrix.version }}"]' ci/ubnt-source.json)
          tar -xf src.tar.bz2 --wildcards 'source/kernel_*' --strip-components 1
          mv kernel_* kernel.tar.gz
          tar -xf kernel.tar.gz --strip-components 1
          # Apply comprehensive DTC yylloc fix for multiple definition errors
          echo "Applying comprehensive DTC yylloc fix..."
          # Fix source files
          find . -name "dtc-lexer.l" -exec grep -l "YYLTYPE yylloc" {} \; | while read -r file; do
            echo "Fixing source DTC file: $file"
            sed -i 's/^[[:space:]]*YYLTYPE[[:space:]]\+yylloc[[:space:]]*;[[:space:]]*$/extern YYLTYPE yylloc;/' "$file"
          done
          # Also fix any shipped/generated files that might exist
          find . -name "dtc-lexer.lex.c*" -exec grep -l "YYLTYPE yylloc" {} \; | while read -r file; do
            echo "Fixing generated DTC file: $file"
            sed -i 's/^[[:space:]]*YYLTYPE[[:space:]]\+yylloc[[:space:]]*;[[:space:]]*$/extern YYLTYPE yylloc;/' "$file"
          done
          if [ ${{ matrix.version }} -ne 1 ]; then make ARCH=mips ubnt_er_${{ matrix.device }}_defconfig; fi;
          # Try first make and catch DTC failures
          if ! make -j$(nproc) ARCH=mips CROSS_COMPILE=$CROSS prepare modules_prepare; then
            echo "First make failed, fixing generated DTC files..."
            find . -name "dtc-lexer.lex.c" -exec grep -l "YYLTYPE yylloc" {} \; | while read -r file; do
              echo "Fixing newly generated DTC file: $file"
              sed -i 's/^[[:space:]]*YYLTYPE[[:space:]]\+yylloc[[:space:]]*;[[:space:]]*$/extern YYLTYPE yylloc;/' "$file"
            done
            # Retry make
            make -j$(nproc) ARCH=mips CROSS_COMPILE=$CROSS prepare modules_prepare
          fi
          make -j$(nproc) ARCH=mips CROSS_COMPILE=$CROSS modules #vmlinux
          cp Module.symvers .config /headers
          make mrproper
          # Re-apply DTC yylloc fix after mrproper cleans everything
          echo "Re-applying comprehensive DTC yylloc fix after mrproper..."
          find . -name "dtc-lexer.l" -exec grep -l "YYLTYPE yylloc" {} \; | while read -r file; do
            echo "Re-fixing source DTC file: $file"
            sed -i 's/^[[:space:]]*YYLTYPE[[:space:]]\+yylloc[[:space:]]*;[[:space:]]*$/extern YYLTYPE yylloc;/' "$file"
          done
          # Try second make with catch for DTC failures
          if ! make -j$(nproc) ARCH=mips O=/headers CROSS_COMPILE=$CROSS prepare modules_prepare scripts; then
            echo "Second make failed, fixing generated DTC files..."
            find . -name "dtc-lexer.lex.c" -exec grep -l "YYLTYPE yylloc" {} \; | while read -r file; do
              echo "Re-fixing generated DTC file: $file"
              sed -i 's/^[[:space:]]*YYLTYPE[[:space:]]\+yylloc[[:space:]]*;[[:space:]]*$/extern YYLTYPE yylloc;/' "$file"
            done
            # Retry make
            make -j$(nproc) ARCH=mips O=/headers CROSS_COMPILE=$CROSS prepare modules_prepare scripts
          fi
          rm /headers/source /headers/Makefile
          # This is from alpine linux who in turn got it from
          # http://kernel.ubuntu.com/git/ubuntu/ubuntu-zesty.git/tree/debian/rules.d/3-binary-indep.mk
          find . -path './include/*' -prune -o -path './scripts/*' -prune -o -type f \( -name 'Makefile*' -o -name 'Kconfig*' -o -name 'Kbuild*' -o -name '*.sh' -o -name '*.pl' -o -name '*.lds' -o -name 'Platform' \) -print | cpio -pdm "/headers"
          cp -a scripts include "/headers"
          find $(find arch -name include -type d -print) -type f | cpio -pdm "/headers"
          tar -cf headers.tar /headers/
      - name: Store headers
        uses: actions/upload-artifact@v4
        with:
          name: headers-${{ matrix.device }}-${{ matrix.version }}
          path: headers.tar

  module-prepare:
    runs-on: ubuntu-24.04
    container:
      image: buildpack-deps:focal

    steps:
      - uses: actions/checkout@v2
      - name: Download module source
        run: |
          curl -L -o amneziawg-linux-kernel-module-$MODULE_VERSION.tar.gz https://github.com/amnezia-vpn/amneziawg-linux-kernel-module/archive/refs/tags/v$MODULE_VERSION.tar.gz
          tar -xf amneziawg-linux-kernel-module-$MODULE_VERSION.tar.gz --one-top-level=module --strip-components=1
          cd module
          sed -i 's/ --dirty//g' src/Makefile
          patch -p1 < ../siphash_no_fallthrough.patch
          # Apply netlink API compatibility fixes via Python script to avoid patch conflicts
          python3 ../fix_netlink_api.py
      - name: Upload module source
        uses: actions/upload-artifact@v4
        with:
          name: module-src
          path: module

  module:
    needs: [docker, module-prepare, headers]
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/ubnt-build:${{ matrix.image }}

    strategy:
      matrix:
        device: [e300]
        version: [2]
        toolchain: [mips64-octeon-linux-]
        image: [octeon-kernel]


    steps:
      - uses: actions/checkout@v2
      - name: Restore module source
        uses: actions/download-artifact@v4
        with:
          name: module-src
          path: module
      - name: Restore headers
        uses: actions/download-artifact@v4
        with:
          name: headers-${{ matrix.device }}-${{ matrix.version }}
      - name: Build module
        run: |
          tar -xf headers.tar
          echo "=== Debugging module build setup ==="
          echo "Working directory: $(pwd)"
          echo "Module directory contents:"
          ls -la module/
          echo "Module src contents:"
          ls -la module/src/
          echo "Headers directory contents:"
          ls -la headers/ | head -10
          echo "Checking for critical build files:"
          ls -la headers/.config headers/Module.symvers headers/scripts/ 2>/dev/null || echo "Some build files missing"
          cd module/src
          echo "=== Attempting module build ==="
          echo "Build command: make ARCH=mips CROSS_COMPILE=${{ matrix.toolchain }} KERNELDIR=$GITHUB_WORKSPACE/headers KERNELRELEASE=4.9.0 module"
          # Force legacy kernel mode since UBNT devices use older kernels (4.x, not 5.6+)
          # This prevents AmnesiaWG from trying to build in generated/ directory
          make V=1 ARCH=mips CROSS_COMPILE=${{ matrix.toolchain }} KERNELDIR=$GITHUB_WORKSPACE/headers KERNELRELEASE=4.9.0 module
          # Strip the resulting module (AmnesiaWG produces amneziawg.ko)
          if [ -f amneziawg.ko ]; then
            ${{ matrix.toolchain }}strip --strip-debug amneziawg.ko
            # Create symlink with expected name for compatibility
            ln -sf amneziawg.ko wireguard.ko
          elif [ -f generated/amneziawg.ko ]; then
            cp generated/amneziawg.ko ./amneziawg.ko
            ${{ matrix.toolchain }}strip --strip-debug amneziawg.ko
            # Create symlink with expected name for compatibility
            ln -sf amneziawg.ko wireguard.ko
          else
            echo "ERROR: No amneziawg.ko found after build"
            find . -name "*.ko" 2>/dev/null || echo "No .ko files found"
            exit 1
          fi
      - name: Upload built module
        uses: actions/upload-artifact@v4
        with:
          name: module-${{ matrix.device }}-${{ matrix.version }}
          path: module/src/wireguard.ko

  tools:
    needs: docker
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/ubnt-build:${{ matrix.arch }}-tools

    strategy:
      matrix:
        include:
          - arch: mips
            target: mips-linux-musl
          - arch: mipsel
            target: mipsel-linux-musl
    steps:
      - uses: actions/checkout@v2
      - name: Build tools
        env:
          TARGET: ${{ matrix.target }}
          ARCH: ${{ matrix.arch }}
        run: |
          apk add gnupg
          curl -L -o amneziawg-tools-$TOOLS_VERSION.tar.gz https://github.com/amnezia-vpn/amneziawg-tools/archive/refs/tags/v$TOOLS_VERSION.tar.gz
          tar -xf amneziawg-tools-$TOOLS_VERSION.tar.gz
          mv amneziawg-tools-$TOOLS_VERSION tools
          cd tools/src
          CC="$ARCH-linux-musl-gcc" LDLIBS="-static" make -j$(nproc)
          $ARCH-linux-musl-strip --strip-unneeded wg
      - name: Upload built tools
        uses: actions/upload-artifact@v4
        with:
          name: tools-${{ matrix.arch }}
          path: tools/src/wg

  package:
    needs: [module, tools]
    runs-on: ubuntu-24.04
    container:
      image: debian

    strategy:
      matrix:
        device: [e300]
        version: [2]
        arch: [mips]
    steps:
      - uses: actions/checkout@v2
      - name: Download module
        uses: actions/download-artifact@v4
        with:
          name: module-${{ matrix.device }}-${{ matrix.version }}
      - name: Download tools
        uses: actions/download-artifact@v4
        with:
          name: tools-${{ matrix.arch }}
      - name: Build package
        run: |
          apt update
          apt install -y kmod
          export KERNEL=$(modinfo -F vermagic wireguard.ko | cut -d ' ' -f 1)
          mkdir -p pkg/usr/bin pkg/lib/modules/$KERNEL/kernel/net
          cp -r debian pkg/DEBIAN
          cp -r opt pkg/opt
          cp wireguard.ko pkg/lib/modules/$KERNEL/kernel/net/wireguard.ko
          cp wg pkg/usr/bin/wg
          chmod +x pkg/usr/bin/wg
          sed -i "s/PACKAGE_VERSION/$MODULE_VERSION/g" pkg/DEBIAN/control
          sed -i "s/PACKAGE_RELEASE/$PACKAGE_RELEASE/g" pkg/DEBIAN/control
          sed -i "s/KERNEL_VER/$KERNEL/g" pkg/DEBIAN/preinst
          sed -i "s/PACKAGE_ARCH/${{ matrix.arch }}/g" pkg/DEBIAN/control
          dpkg-deb -b -Z gzip pkg
          mv pkg.deb ${{ matrix.device }}-v${{ matrix.version }}-v$MODULE_VERSION-v$TOOLS_VERSION.deb
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: release_${{ matrix.device }}-v${{ matrix.version }}
          path: ${{ matrix.device }}-v${{ matrix.version }}-v${{ env.MODULE_VERSION }}-v${{ env.TOOLS_VERSION }}.deb

 
